<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grok Video Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{--color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f3f0ec;--color-border:#d4d1ca;--color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;--color-primary:#01696f;--color-primary-hover:#0c4e54;--color-success:#437a22;--color-error:#a12c7b;--color-warning:#964219;--shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);--shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);--radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--font-body:'Inter',sans-serif}
[data-theme="dark"]{--color-bg:#0f0f0e;--color-surface:#161614;--color-surface-2:#1c1b19;--color-surface-offset:#1d1c1a;--color-border:#2e2d2b;--color-divider:#232220;--color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#4a4947;--color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-success:#6daa45;--color-error:#d163a7;--color-warning:#bb653b;--shadow-sm:0 1px 2px oklch(0 0 0/0.3);--shadow-md:0 4px 12px oklch(0 0 0/0.4)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{min-height:100dvh;font-family:var(--font-body);font-size:clamp(0.875rem,0.8rem+0.35vw,1rem);color:var(--color-text);background:var(--color-bg);display:flex;flex-direction:column}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
input,textarea,select{font:inherit;color:inherit}
a,button,[role=button],input,textarea,select{transition:color 180ms cubic-bezier(0.16,1,0.3,1),background 180ms cubic-bezier(0.16,1,0.3,1),border-color 180ms cubic-bezier(0.16,1,0.3,1),box-shadow 180ms cubic-bezier(0.16,1,0.3,1)}

/* Layout */
header{position:sticky;top:0;z-index:100;background:var(--color-bg);border-bottom:1px solid var(--color-divider);padding:0.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.logo{display:flex;align-items:center;gap:0.625rem;font-weight:600;font-size:clamp(0.875rem,0.8rem+0.35vw,1rem);letter-spacing:-0.01em}
.header-actions{display:flex;align-items:center;gap:0.5rem}
.theme-btn{width:36px;height:36px;border-radius:var(--radius-md);display:grid;place-items:center;color:var(--color-text-muted)}
.theme-btn:hover{background:var(--color-surface-offset);color:var(--color-text)}

.app-layout{display:grid;grid-template-columns:360px 1fr;min-height:calc(100dvh - 53px)}
@media(max-width:768px){.app-layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}}

/* Sidebar */
.sidebar{border-right:1px solid var(--color-divider);padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem;overflow-y:auto}
.sidebar-section{display:flex;flex-direction:column;gap:0.625rem}
.section-label{font-size:clamp(0.75rem,0.7rem+0.25vw,0.875rem);font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.06em}

/* Form elements */
label{font-size:clamp(0.75rem,0.7rem+0.25vw,0.875rem);font-weight:500;color:var(--color-text-muted);display:block;margin-bottom:0.375rem}
input[type=text],input[type=url],textarea,select{width:100%;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:0.5rem 0.75rem;font-size:clamp(0.875rem,0.8rem+0.35vw,1rem);color:var(--color-text);outline:none;resize:none}
input[type=text]:focus,input[type=url]:focus,textarea:focus,select:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px oklch(from var(--color-primary) l c h/0.15)}
textarea{min-height:100px;line-height:1.5}

/* Tabs */
.tabs{display:flex;border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:3px;gap:2px;background:var(--color-surface-offset)}
.tab-btn{flex:1;padding:0.375rem 0.75rem;border-radius:calc(var(--radius-lg) - 3px);font-size:clamp(0.75rem,0.7rem+0.25vw,0.875rem);font-weight:500;color:var(--color-text-muted);text-align:center}
.tab-btn.active{background:var(--color-surface-2);color:var(--color-text);box-shadow:var(--shadow-sm)}
.tab-btn:hover:not(.active){color:var(--color-text)}

/* Upload zone */
.upload-zone{border:1px dashed var(--color-border);border-radius:var(--radius-lg);padding:1.5rem 1rem;text-align:center;cursor:pointer;color:var(--color-text-muted);font-size:clamp(0.75rem,0.7rem+0.25vw,0.875rem);display:flex;flex-direction:column;align-items:center;gap:0.5rem;position:relative}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--color-primary);color:var(--color-primary);background:oklch(from var(--color-primary) l c h/0.05)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-preview{width:100%;aspect-ratio:16/9;border-radius:var(--radius-md);object-fit:cover;display:none}

/* Params grid */
.params-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}

/* Range input */
input[type=range]{width:100%;accent-color:var(--color-primary)}
.range-row{display:flex;justify-content:space-between;align-items:center;gap:0.5rem}
.range-val{font-size:clamp(0.75rem,0.7rem+0.25vw,0.875rem);color:var(--color-primary);font-weight:600;font-variant-numeric:tabular-nums;min-width:2.5rem;text-align:right}

/* Buttons */
.btn-primary{width:100%;padding:0.625rem 1rem;background:var(--color-primary);color:#fff;border-radius:var(--radius-md);font-weight:600;font-size:clamp(0.875rem,0.8rem+0.35vw,1rem);letter-spacing:-0.01em;display:flex;align-items:center;justify-content:center;gap:0.5rem}
.btn-primary:hover{background:var(--color-primary-hover)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-sm{padding:0.375rem 0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:clamp(0.75rem,0.7rem+0.25vw,0.875rem);color:var(--color-text-muted)}
.btn-sm:hover{background:var(--color-surface-offset);color:var(--color-text)}

/* Worker URL banner */
.worker-banner{background:oklch(from var(--color-warning) l c h/0.1);border:1px solid oklch(from var(--color-warning) l c h/0.3);border-radius:var(--radius-md);padding:0.625rem 0.75rem;font-size:clamp(0.75rem,0.7rem+0.25vw,0.875rem);color:var(--color-warning);display:none;gap:0.5rem;align-items:flex-start}
.worker-banner.show{display:flex}

/* Main area */
.main-area{display:flex;flex-direction:column;padding:1.5rem;gap:1.25rem;overflow-y:auto}

/* Status card */
.status-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:1.25rem;display:none;flex-direction:column;gap:1rem}
.status-card.show{display:flex}
.status-header{display:flex;align-items:center;justify-content:space-between}
.status-title{font-weight:600;font-size:clamp(0.875rem,0.8rem+0.35vw,1rem)}
.status-badge{font-size:clamp(0.75rem,0.7rem+0.25vw,0.875rem);padding:0.25rem 0.625rem;border-radius:var(--radius-full,9999px);font-weight:500}
.badge-processing{background:oklch(from var(--color-warning) l c h/0.15);color:var(--color-warning)}
.badge-success{background:oklch(from var(--color-success) l c h/0.15);color:var(--color-success)}
.badge-error{background:oklch(from var(--color-error) l c h/0.15);color:var(--color-error)}
.badge-idle{background:var(--color-surface-offset);color:var(--color-text-muted)}

/* Progress */
.progress-bar-wrap{background:var(--color-surface-offset);border-radius:9999px;height:6px;overflow:hidden}
.progress-bar{height:100%;background:var(--color-primary);border-radius:9999px;width:0%;transition:width 0.5s ease}

/* Log */
.log-box{background:var(--color-bg);border:1px solid var(--color-divider);border-radius:var(--radius-md);padding:0.75rem;max-height:160px;overflow-y:auto;font-size:0.75rem;font-family:'SF Mono','Consolas',monospace;color:var(--color-text-muted);display:flex;flex-direction:column;gap:0.25rem}
.log-entry{display:flex;gap:0.5rem}
.log-time{color:var(--color-text-faint);flex-shrink:0}
.log-entry.log-ok .log-msg{color:var(--color-success)}
.log-entry.log-err .log-msg{color:var(--color-error)}
.log-entry.log-info .log-msg{color:var(--color-primary)}

/* Video result */
.video-wrap{background:var(--color-surface-offset);border-radius:var(--radius-lg);overflow:hidden;aspect-ratio:16/9;display:none;position:relative}
.video-wrap.show{display:block}
.video-wrap video{width:100%;height:100%;object-fit:contain}
.video-actions{display:flex;gap:0.5rem;flex-wrap:wrap}

/* History */
.history-section{display:flex;flex-direction:column;gap:0.75rem}
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.75rem}
.history-empty{text-align:center;padding:2rem 1rem;color:var(--color-text-faint);font-size:clamp(0.75rem,0.7rem+0.25vw,0.875rem)}
.history-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:box-shadow 180ms cubic-bezier(0.16,1,0.3,1),transform 180ms cubic-bezier(0.16,1,0.3,1)}
.history-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.history-thumb{aspect-ratio:16/9;background:var(--color-surface-offset);display:flex;align-items:center;justify-content:center;color:var(--color-text-faint);font-size:1.5rem}
.history-info{padding:0.625rem 0.75rem}
.history-prompt{font-size:0.75rem;color:var(--color-text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-meta{font-size:0.7rem;color:var(--color-text-faint);margin-top:0.25rem}

/* Request ID chip */
.req-id-row{display:flex;align-items:center;gap:0.5rem;font-size:0.75rem}
.req-id-chip{font-family:'SF Mono','Consolas',monospace;background:var(--color-surface-offset);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:0.125rem 0.5rem;color:var(--color-text-muted);overflow:hidden;text-overflow:ellipsis;max-width:260px;white-space:nowrap}

/* Divider */
.divider{height:1px;background:var(--color-divider)}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid oklch(from currentColor l c h/0.3);border-top-color:currentColor;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle}

/* Shimmer */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-surface-2) 50%,var(--color-surface-offset) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--radius-sm)}

:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-label="Grok Video" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="4" width="15" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
      <path d="M17 9l5-3v8l-5-3V9z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="9" cy="19" r="1.5" fill="var(--color-primary)"/>
      <path d="M6 19h6" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    Grok Video Generator
  </div>
  <div class="header-actions">
    <button class="theme-btn" data-theme-toggle aria-label="切換主題">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="sidebar-section">
      <div class="section-label">Worker 設定</div>
      <div>
        <label for="workerUrl">Worker URL</label>
        <input type="url" id="workerUrl" placeholder="https://your-worker.workers.dev" autocomplete="off">
      </div>
      <div id="workerBanner" class="worker-banner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>請先填入 Worker URL 才能生成影片</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="sidebar-section">
      <div class="section-label">生成模式</div>
      <div class="tabs" role="tablist">
        <button class="tab-btn active" role="tab" data-mode="text" id="tab-text">文字生成</button>
        <button class="tab-btn" role="tab" data-mode="image" id="tab-image">圖片生成</button>
      </div>
    </div>

    <div class="sidebar-section" id="promptSection">
      <div>
        <label for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="描述你想生成的影片內容，例如：一隻貓咪在草地上奔跑，陽光明媚..."></textarea>
      </div>
    </div>

    <div class="sidebar-section" id="imageSection" style="display:none">
      <div>
        <label>上傳圖片</label>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="imageInput" accept="image/*">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span id="uploadText">點擊或拖曳上傳圖片</span>
          <img id="uploadPreview" class="upload-preview" alt="預覽">
        </div>
      </div>
      <div>
        <label for="imagePrompt">動態描述（可選）</label>
        <textarea id="imagePrompt" placeholder="描述圖片的動態效果，如：緩緩飄動的雲朵..."></textarea>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">參數設定</div>
      <div class="params-grid">
        <div>
          <label for="duration">時長（秒）</label>
          <select id="duration">
            <option value="5">5s</option>
            <option value="10" selected>10s</option>
          </select>
        </div>
        <div>
          <label for="resolution">解析度</label>
          <select id="resolution">
            <option value="720p" selected>720p</option>
            <option value="1080p">1080p</option>
          </select>
        </div>
        <div>
          <label for="ratio">比例</label>
          <select id="ratio">
            <option value="16:9" selected>16:9</option>
            <option value="9:16">9:16</option>
            <option value="1:1">1:1</option>
          </select>
        </div>
        <div>
          <label for="pollInterval">輪詢間隔</label>
          <select id="pollInterval">
            <option value="5000">5s</option>
            <option value="10000" selected>10s</option>
            <option value="15000">15s</option>
          </select>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <button class="btn-primary" id="generateBtn" onclick="startGenerate()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        開始生成
      </button>
    </div>

  </aside>

  <!-- Main -->
  <main class="main-area">

    <!-- Status card -->
    <div class="status-card" id="statusCard">
      <div class="status-header">
        <span class="status-title" id="statusTitle">正在生成...</span>
        <span class="status-badge badge-processing" id="statusBadge">處理中</span>
      </div>

      <div class="req-id-row">
        <span style="color:var(--color-text-faint);font-size:0.7rem">Request ID</span>
        <span class="req-id-chip" id="reqIdDisplay">—</span>
        <button class="btn-sm" onclick="copyReqId()" id="copyReqBtn" style="display:none">複製</button>
      </div>

      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="log-box" id="logBox"></div>

      <div class="video-wrap" id="videoWrap">
        <video id="resultVideo" controls playsinline></video>
      </div>

      <div class="video-actions" id="videoActions" style="display:none">
        <button class="btn-sm" onclick="downloadVideo()">⬇ 下載影片</button>
        <button class="btn-sm" onclick="copyVideoUrl()">🔗 複製連結</button>
        <button class="btn-sm" onclick="resetStatus()">✕ 清除</button>
      </div>
    </div>

    <!-- History -->
    <div class="history-section">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-weight:600;font-size:clamp(0.875rem,0.8rem+0.35vw,1rem)">生成歷史</span>
        <button class="btn-sm" onclick="clearHistory()">清除全部</button>
      </div>
      <div class="history-grid" id="historyGrid">
        <div class="history-empty">尚無生成記錄</div>
      </div>
    </div>

  </main>
</div>

<script>
// Theme toggle
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  const icons={dark:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',light:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'};
  t&&t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);t.innerHTML=icons[d]});
})();

// State
let state={mode:'text',polling:null,currentReqId:null,videoUrl:null,history:[],imageBase64:null,imageFile:null};

// Tab switch
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.mode=btn.dataset.mode;
    document.getElementById('promptSection').style.display=state.mode==='text'?'':'none';
    document.getElementById('imageSection').style.display=state.mode==='image'?'':'none';
  });
});

// Upload zone
const uploadZone=document.getElementById('uploadZone');
const imageInput=document.getElementById('imageInput');
['dragover','dragleave','drop'].forEach(ev=>uploadZone.addEventListener(ev,e=>{
  e.preventDefault();
  if(ev==='dragover')uploadZone.classList.add('drag-over');
  else uploadZone.classList.remove('drag-over');
  if(ev==='drop'&&e.dataTransfer.files[0])handleImageFile(e.dataTransfer.files[0]);
}));
imageInput.addEventListener('change',e=>{if(e.target.files[0])handleImageFile(e.target.files[0]);});
function handleImageFile(file){
  state.imageFile=file;
  const reader=new FileReader();
  reader.onload=e=>{
    state.imageBase64=e.target.result;
    const prev=document.getElementById('uploadPreview');
    prev.src=e.target.result;prev.style.display='block';
    document.getElementById('uploadText').style.display='none';
  };
  reader.readAsDataURL(file);
}

// Log
function addLog(msg,type='info'){
  const box=document.getElementById('logBox');
  const now=new Date();
  const t=now.toTimeString().slice(0,8);
  const div=document.createElement('div');
  div.className=`log-entry log-${type}`;
  div.innerHTML=`<span class="log-time">${t}</span><span class="log-msg">${msg}</span>`;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function setProgress(pct){document.getElementById('progressBar').style.width=pct+'%';}
function setBadge(text,cls){
  const b=document.getElementById('statusBadge');
  b.textContent=text;
  b.className='status-badge '+cls;
}

async function startGenerate(){
  const workerUrl=document.getElementById('workerUrl').value.trim();
  if(!workerUrl){
    document.getElementById('workerBanner').classList.add('show');
    document.getElementById('workerUrl').focus();
    return;
  }
  document.getElementById('workerBanner').classList.remove('show');

  const prompt=document.getElementById('prompt').value.trim();
  const imagePrompt=document.getElementById('imagePrompt').value.trim();
  if(state.mode==='text'&&!prompt){alert('請輸入 Prompt');return;}
  if(state.mode==='image'&&!state.imageBase64){alert('請上傳圖片');return;}

  // Reset UI
  stopPolling();
  state.currentReqId=null;state.videoUrl=null;
  document.getElementById('statusCard').classList.add('show');
  document.getElementById('logBox').innerHTML='';
  document.getElementById('videoWrap').classList.remove('show');
  document.getElementById('videoActions').style.display='none';
  document.getElementById('reqIdDisplay').textContent='—';
  document.getElementById('copyReqBtn').style.display='none';
  setProgress(5);
  setBadge('送出中','badge-processing');
  document.getElementById('statusTitle').textContent='正在送出請求...';
  const btn=document.getElementById('generateBtn');btn.disabled=true;

  addLog('正在呼叫 Worker API...','info');

  try{
    const body=state.mode==='text'?{
      prompt,
      duration:parseInt(document.getElementById('duration').value),
      resolution:document.getElementById('resolution').value,
      aspect_ratio:document.getElementById('ratio').value
    }:{
      image:state.imageBase64,
      prompt:imagePrompt||undefined,
      duration:parseInt(document.getElementById('duration').value),
      resolution:document.getElementById('resolution').value,
      aspect_ratio:document.getElementById('ratio').value
    };

    const endpoint=workerUrl.replace(/\/$/,'')+(state.mode==='text'?'/generate':'/generate-from-image');
    const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();

    if(!res.ok||data.error){addLog('API 錯誤: '+(data.error||res.status),'err');setBadge('失敗','badge-error');btn.disabled=false;return;}

    const reqId=data.request_id||data.id;
    if(!reqId){addLog('未取得 request_id','err');setBadge('失敗','badge-error');btn.disabled=false;return;}

    state.currentReqId=reqId;
    document.getElementById('reqIdDisplay').textContent=reqId;
    document.getElementById('copyReqBtn').style.display='';
    setProgress(15);
    addLog('Request ID: '+reqId,'ok');
    addLog('開始輪詢狀態...','info');
    setBadge('處理中','badge-processing');
    document.getElementById('statusTitle').textContent='AI 正在生成影片...';
    startPolling(workerUrl,reqId);

  }catch(e){
    addLog('請求失敗: '+e.message,'err');
    setBadge('失敗','badge-error');
    btn.disabled=false;
  }
}

let pollCount=0;
function startPolling(workerUrl,reqId){
  const interval=parseInt(document.getElementById('pollInterval').value);
  pollCount=0;
  state.polling=setInterval(()=>pollStatus(workerUrl,reqId),interval);
}
function stopPolling(){if(state.polling){clearInterval(state.polling);state.polling=null;}}

async function pollStatus(workerUrl,reqId){
  pollCount++;
  const pct=Math.min(15+pollCount*5,85);
  setProgress(pct);
  try{
    const url=workerUrl.replace(/\/$/,'')+'/status/'+reqId;
    const res=await fetch(url);
    const data=await res.json();
    const st=data.status||(data.data&&data.data.status)||'processing';
    addLog(`[#${pollCount}] 狀態: ${st}`,'info');

    if(st==='succeeded'||st==='completed'||st==='success'){
      stopPolling();
      const video=data.video_url||(data.data&&data.data.works&&data.data.works[0]&&data.data.works[0].resource&&data.data.works[0].resource.resource);
      if(video){
        state.videoUrl=video;
        setProgress(100);
        setBadge('完成','badge-success');
        document.getElementById('statusTitle').textContent='影片生成完成！';
        const v=document.getElementById('resultVideo');
        v.src=video;
        document.getElementById('videoWrap').classList.add('show');
        document.getElementById('videoActions').style.display='flex';
        addLog('影片生成成功 ✓','ok');
        addToHistory(video);
      }else{addLog('成功但無影片 URL','err');}
      document.getElementById('generateBtn').disabled=false;
    }else if(st==='failed'||st==='error'){
      stopPolling();
      addLog('生成失敗: '+(data.error||data.message||'未知錯誤'),'err');
      setBadge('失敗','badge-error');
      document.getElementById('generateBtn').disabled=false;
    }
  }catch(e){
    addLog('輪詢錯誤: '+e.message,'err');
  }
}

function copyReqId(){
  if(state.currentReqId){navigator.clipboard.writeText(state.currentReqId);addLog('已複製 Request ID','ok');}
}
function downloadVideo(){
  if(!state.videoUrl)return;
  const a=document.createElement('a');a.href=state.videoUrl;a.download='grok-video-'+Date.now()+'.mp4';a.target='_blank';a.click();
}
function copyVideoUrl(){
  if(state.videoUrl){navigator.clipboard.writeText(state.videoUrl);addLog('已複製影片連結','ok');}
}
function resetStatus(){
  stopPolling();
  document.getElementById('statusCard').classList.remove('show');
  document.getElementById('generateBtn').disabled=false;
  state.currentReqId=null;state.videoUrl=null;
}

// History
function addToHistory(videoUrl){
  const prompt=document.getElementById(state.mode==='text'?'prompt':'imagePrompt').value.trim()||'(圖片生成)';
  const item={id:Date.now(),videoUrl,prompt,time:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})};
  state.history.unshift(item);
  renderHistory();
}
function renderHistory(){
  const grid=document.getElementById('historyGrid');
  if(!state.history.length){grid.innerHTML='<div class="history-empty">尚無生成記錄</div>';return;}
  grid.innerHTML=state.history.map(item=>`
    <div class="history-card" onclick="playHistory('${item.videoUrl}')">
      <div class="history-thumb">▶</div>
      <div class="history-info">
        <div class="history-prompt">${escHtml(item.prompt)}</div>
        <div class="history-meta">${item.time}</div>
      </div>
    </div>`).join('');
}
function playHistory(url){
  state.videoUrl=url;
  const v=document.getElementById('resultVideo');v.src=url;
  document.getElementById('statusCard').classList.add('show');
  document.getElementById('videoWrap').classList.add('show');
  document.getElementById('videoActions').style.display='flex';
  setBadge('歷史','badge-idle');
  document.getElementById('statusTitle').textContent='歷史影片回放';
  v.play();
}
function clearHistory(){state.history=[];renderHistory();}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
